      <stop offset="0.56" stop-color="#b6d957"/>
      <stop offset="0.75" stop-color="#ffb74a"/>
      <stop offset="1" stop-color="#ff4e6a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
