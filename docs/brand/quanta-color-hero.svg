<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Quanta Color workbench hero</title>
  <desc id="desc">A color-science workbench surface with gamut plots, tone curves, swatches, and spectral bands.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111c"/>
      <stop offset="0.52" stop-color="#102033"/>
      <stop offset="1" stop-color="#241e2d"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
